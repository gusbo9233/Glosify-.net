<html class="dark" lang="en">

                    "inverse-on-surface": "#233148",
                    "on-surface": "#d6e3ff",
                    "primary": "#53e076"

            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .glass-card {
            background: linear-gradient(135deg, rgba(44, 57, 81, 0.6) 0%, rgba(17, 32, 54, 0.6) 100%);
            backdrop-filter: blur(20px);
        }
    </style>
</head>

    <main class="w-full max-w-7xl mx-auto px-8 py-12">

            </div>

        </section>
        <!-- Language Cards Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- Estonian Card -->

                </div>

            </a>
            <!-- German Card -->
            <a class="glass-card group p-8 rounded-xl flex flex-col items-center justify-center gap-6 hover:scale-[1.05] transition-all duration-300 shadow-xl border border-white/10 hover:border-primary/30" href="#">
                <div class="w-24 h-16 rounded-md overflow-hidden shadow-lg transform group-hover:scale-110 transition-transform duration-300">
                    <img class="w-full h-full object-cover" data-alt="black, red and gold horizontal stripes of the German flag" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDtTcg-PhZP3mjyCresEL0CRqfXzICDSN3flFNVzt_jnZgFZM_dQegDgkoXrDS-cVFpESLt4ZLa1lH3A-aRlQV63lDpWiUBAS7WIIgxFPHk0sh6hQ-5EMl021f3gbQxbeTSjyDIoax0-jeJ2OCi-zEqxMmEJc8zV76APRiPCyti-IwVi-w7ephZUCOWHtXKiXYY4Z_oYUvMFIRQSVoJRW59SRdNa4vrNYsZuEJqFMEmitdI-XJAqSRllZ73eYBmNs4ONl-FjeaLPp8P" />

            </a>
            <!-- Polish Card -->
            <a class="glass-card group p-8 rounded-xl flex flex-col items-center justify-center gap-6 hover:scale-[1.05] transition-all duration-300 shadow-xl border border-white/10 hover:border-primary/30" href="#">

                    <img class="w-full h-full object-cover" data-alt="white and red horizontal stripes of the Polish flag" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBhSKPE5hg1m8thMS3lJIlTH9hK3CiwNKxshTwXSU4L4ArDh3nnBw-joJjK7k5Cjh7nBpFP7J-BgkJSO3ZAkbtupZ2nZeTJdQX_oeEIeRU03Q1nnhG_QLYD3gmU-57Cv3ZdJ9Fwy6LYDJRl8fn2TBsR8NcFk4IWBu90BstA3vjgJ5vMRSV0ACVo47T-UCbsg8ys1GmI_nltEws2wo1xvDBwJYYA9dpIpyIKqLSVhL2bPxAgbalVXXccy-dcBWr5R334AqL20MrQIWW4" />

            </a>

</html>
